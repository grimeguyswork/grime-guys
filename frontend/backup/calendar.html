<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Grime Guys - Calendar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .calendar-container {
            background: white;
            border-radius: 12px;
            overflow-x: auto;
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .calendar-nav {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .calendar-nav button {
            background: #17542a;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }
        .month-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background: #ddd;
            border: 1px solid #ddd;
        }
        .month-day-header {
            background: #17542a;
            color: white;
            padding: 12px;
            text-align: center;
            font-weight: bold;
        }
        .calendar-day {
            background: white;
            min-height: 100px;
            padding: 8px;
        }
        .calendar-day.other-month {
            background: #f9f9f9;
            color: #999;
        }
        .calendar-day.today {
            background: #e8f5e9;
            border: 2px solid #99bb43;
        }
        .day-number {
            font-weight: bold;
            margin-bottom: 8px;
        }
        .calendar-event {
            background: #99bb43;
            color: #17542a;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .calendar-event:hover {
            transform: translateX(2px);
        }
        .calendar-event.status-Quote { background: #f39c12; color: white; }
        .calendar-event.status-Scheduled { background: #3498db; color: white; }
        .calendar-event.status-Completed { background: #2ecc71; color: white; }
        .calendar-event.status-Paid { background: #27ae60; color: white; }
        @media (max-width: 768px) {
            .calendar-event { font-size: 10px; padding: 2px 4px; }
            .calendar-day { min-height: 70px; }
        }
    </style>
</head>
<body>

<div class="app-header">
    <div class="logo">🧼 Grime Guys</div>
    <button class="menu-toggle" id="menuToggle">☰</button>
    <a href="job-form.html" class="btn">+ New Job</a>
</div>

<div class="sidebar" id="sidebar">
    <button class="close-sidebar" id="closeSidebar">✕</button>
    <a href="index.html">📊 Dashboard</a>
    <a href="jobs.html">📋 Jobs</a>
    <a href="calendar.html" class="active">📅 Calendar</a>
    <a href="quotes.html">📄 Quotes</a>
    <a href="pricing.html">💰 Pricing</a>
    <a href="clients.html">👥 Clients</a>
    <a href="expenses.html">💸 Expenses</a>
    <a href="inventory.html">📦 Inventory</a>
    <a href="photos.html">📸 Photos</a>
    <a href="invoices.html">🧾 Invoices</a>
    <a href="weather.html">🌤️ Weather</a>
    <a href="route.html">🗺️ Route</a>
    <a href="costing.html">💰 Job Costing</a>
    <a href="social.html">📱 Social</a>
    <a href="settings.html">⚙️ Settings</a>
</div>

<div class="bottom-nav">
    <a href="index.html"><span>📊</span><span>Dashboard</span></a>
    <a href="jobs.html"><span>📋</span><span>Jobs</span></a>
    <a href="calendar.html" class="active"><span>📅</span><span>Calendar</span></a>
    <a href="quotes.html"><span>📄</span><span>Quotes</span></a>
    <a href="settings.html"><span>⚙️</span><span>Menu</span></a>
</div>

<main class="main-content">
    <div class="card">
        <div class="calendar-header">
            <div class="calendar-nav">
                <button onclick="changeMonth(-1)">←</button>
                <h2 id="currentMonthDisplay"></h2>
                <button onclick="changeMonth(1)">→</button>
                <button onclick="goToToday()" class="btn-small">Today</button>
            </div>
        </div>
        <div id="calendarView"></div>
    </div>
</main>

<script>
    let currentDate = new Date();
    let allJobs = [];

    async function loadJobs() {
        const res = await fetch('http://localhost:3001/api/jobs?limit=500');
        allJobs = await res.json();
        renderCalendar();
    }

    function renderCalendar() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        
        const firstDay = new Date(year, month, 1);
        const lastDay = new Date(year, month + 1, 0);
        const startDay = firstDay.getDay();
        const daysInMonth = lastDay.getDate();
        
        let html = `
            <div class="month-grid">
                <div class="month-day-header">Sun</div>
                <div class="month-day-header">Mon</div>
                <div class="month-day-header">Tue</div>
                <div class="month-day-header">Wed</div>
                <div class="month-day-header">Thu</div>
                <div class="month-day-header">Fri</div>
                <div class="month-day-header">Sat</div>
        `;
        
        const today = new Date();
        
        for (let i = 0; i < 42; i++) {
            const dayOfMonth = i - startDay + 1;
            const isCurrentMonth = dayOfMonth >= 1 && dayOfMonth <= daysInMonth;
            const dateStr = isCurrentMonth ? `${year}-${String(month+1).padStart(2,'0')}-${String(dayOfMonth).padStart(2,'0')}` : '';
            const isToday = today.toDateString() === new Date(year, month, dayOfMonth).toDateString();
            
            let dayClass = 'calendar-day';
            if (!isCurrentMonth) dayClass += ' other-month';
            if (isToday && isCurrentMonth) dayClass += ' today';
            
            const dayJobs = allJobs.filter(job => job.job_date === dateStr);
            
            html += `<div class="${dayClass}">
                <div class="day-number">${isCurrentMonth ? dayOfMonth : ''}</div>`;
            
            dayJobs.forEach(job => {
                const statusClass = job.status === 'Quote' ? 'status-Quote' : 
                                  job.status === 'Scheduled' ? 'status-Scheduled' :
                                  job.status === 'Completed' ? 'status-Completed' : 'status-Paid';
                html += `<div class="calendar-event ${statusClass}" onclick="viewJob(${job.id})">
                    ${job.customer_name}<br>
                    <small>$${job.revenue || 0}</small>
                </div>`;
            });
            
            html += `</div>`;
        }
        
        html += `</div>`;
        document.getElementById('calendarView').innerHTML = html;
        document.getElementById('currentMonthDisplay').innerText = currentDate.toLocaleString('default', { month: 'long', year: 'numeric' });
    }

    function changeMonth(delta) {
        currentDate.setMonth(currentDate.getMonth() + delta);
        renderCalendar();
    }

    function goToToday() {
        currentDate = new Date();
        renderCalendar();
    }

    function viewJob(id) {
        window.location.href = `job-form.html?id=${id}`;
    }

    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    const closeSidebar = document.getElementById('closeSidebar');
    if (menuToggle) {
        menuToggle.addEventListener('click', () => sidebar.classList.add('open'));
    }
    if (closeSidebar) {
        closeSidebar.addEventListener('click', () => sidebar.classList.remove('open'));
    }

    loadJobs();
</script>
</body>
</html>
