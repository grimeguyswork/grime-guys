<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grime Guys - Photo Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .photo-card {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
        }
        .photo-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }
        .photo-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: var(--gray-light);
        }
        .photo-info {
            padding: 12px;
        }
        .photo-caption {
            font-size: 14px;
            color: var(--text-light);
            margin-top: 4px;
        }
        .photo-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin-top: 8px;
        }
        .badge-before { background: var(--warning); color: white; }
        .badge-after { background: var(--success); color: white; }
        .comparison-slider {
            position: relative;
            width: 100%;
            height: 300px;
            overflow: hidden;
        }
        .slider-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .slider-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div class="app-header">
    <div class="logo">🧼 Grime Guys</div>
    <button class="menu-toggle" id="menuToggle">☰</button>
    <a href="job-form.html" class="btn">+ New Job</a>
</div>

<div class="sidebar" id="sidebar">
    <button class="close-sidebar" id="closeSidebar">✕</button>
    <a href="index.html">📊 Dashboard</a>
    <a href="jobs.html">📋 Jobs</a>
    <a href="calendar.html">📅 Calendar</a>
    <a href="quotes.html">📄 Quotes</a>
    <a href="pricing.html">💰 Pricing</a>
    <a href="clients.html">👥 Clients</a>
    <a href="expenses.html">💸 Expenses</a>
    <a href="inventory.html">📦 Inventory</a>
    <a href="photos.html" class="active">📸 Photos</a>
    <a href="invoices.html">🧾 Invoices</a>
    <a href="weather.html">🌤️ Weather</a>
    <a href="route.html">🗺️ Route</a>
    <a href="costing.html">💰 Job Costing</a>
    <a href="social.html">📱 Social</a>
    <a href="settings.html">⚙️ Settings</a>
</div>

<div class="bottom-nav">
    <a href="index.html"><span>📊</span><span>Home</span></a>
    <a href="jobs.html"><span>📋</span><span>Jobs</span></a>
    <a href="calendar.html"><span>📅</span><span>Calendar</span></a>
    <a href="photos.html" class="active"><span>📸</span><span>Photos</span></a>
    <a href="settings.html"><span>⚙️</span><span>Menu</span></a>
</div>

<main class="main-content">
    <div class="section-header">
        <h2>📸 Before & After Gallery</h2>
        <button class="btn" onclick="showUploadModal()">+ Upload Photos</button>
    </div>
    
    <div class="gallery-grid" id="galleryGrid"></div>
</main>

<div id="uploadModal" class="modal" style="display:none;">
    <div class="modal-content">
        <h3>Upload Photos</h3>
        <form id="uploadForm">
            <div class="form-group">
                <label>Select Job</label>
                <select id="photoJobId" required></select>
            </div>
            <div class="form-group">
                <label>Photo Type</label>
                <select id="photoType">
                    <option value="before">Before</option>
                    <option value="after">After</option>
                </select>
            </div>
            <div class="form-group">
                <label>Photo</label>
                <input type="file" id="photoFile" accept="image/*" required>
                <img id="photoPreview" style="max-width:100%; margin-top:8px; display:none;">
            </div>
            <div class="form-group">
                <label>Caption</label>
                <input type="text" id="photoCaption" placeholder="What's in this photo?">
            </div>
            <div class="form-actions">
                <button type="submit" class="btn">Upload</button>
                <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            </div>
        </form>
    </div>
</div>

<script>
    async function loadJobs() {
        const res = await fetch('http://localhost:3001/api/jobs?limit=100');
        const jobs = await res.json();
        const select = document.getElementById('photoJobId');
        select.innerHTML = jobs.map(job => 
            `<option value="${job.id}">${job.customer_name} - ${job.service_type} (${job.job_date})</option>`
        ).join('');
    }
    
    async function loadPhotos() {
        const res = await fetch('http://localhost:3001/api/photos');
        const photos = await res.json();
        displayGallery(photos);
    }
    
    function displayGallery(photos) {
        const container = document.getElementById('galleryGrid');
        if (photos.length === 0) {
            container.innerHTML = '<div class="card"><p class="text-center">No photos yet. Upload before/after photos of your work!</p></div>';
            return;
        }
        
        container.innerHTML = photos.map(photo => `
            <div class="photo-card" onclick="viewPhoto(${photo.id})">
                <img class="photo-img" src="${photo.photo_data}" alt="${photo.caption}">
                <div class="photo-info">
                    <strong>${photo.customer_name || 'Customer'}</strong>
                    <span class="photo-badge badge-${photo.photo_type}">${photo.photo_type.toUpperCase()}</span>
                    <div class="photo-caption">${photo.caption || 'No caption'}</div>
                    <div class="photo-caption">${photo.job_date || ''}</div>
                </div>
            </div>
        `).join('');
    }
    
    document.getElementById('photoFile').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('photoPreview').src = e.target.result;
                document.getElementById('photoPreview').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    });
    
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const file = document.getElementById('photoFile').files[0];
        const reader = new FileReader();
        
        reader.onload = async function(e) {
            const photoData = {
                job_id: parseInt(document.getElementById('photoJobId').value),
                photo_type: document.getElementById('photoType').value,
                photo_data: e.target.result,
                caption: document.getElementById('photoCaption').value
            };
            
            await fetch('http://localhost:3001/api/photos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(photoData)
            });
            
            closeModal();
            loadPhotos();
        };
        reader.readAsDataURL(file);
    });
    
    function viewPhoto(id) {
        window.location.href = `photo-view.html?id=${id}`;
    }
    
    function showUploadModal() {
        document.getElementById('uploadModal').style.display = 'flex';
        document.getElementById('uploadForm').reset();
        document.getElementById('photoPreview').style.display = 'none';
    }
    
    function closeModal() {
        document.getElementById('uploadModal').style.display = 'none';
    }
    
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    const closeSidebar = document.getElementById('closeSidebar');
    if (menuToggle) {
        menuToggle.addEventListener('click', () => sidebar.classList.add('open'));
    }
    if (closeSidebar) {
        closeSidebar.addEventListener('click', () => sidebar.classList.remove('open'));
    }
    
    loadJobs();
    loadPhotos();
</script>
</body>
</html>
