<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Grime Guys - Expenses</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .expense-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .expense-card {
            background: white;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }
        .expense-category {
            font-size: 14px;
            color: #666;
        }
        .expense-amount {
            font-size: 20px;
            font-weight: bold;
            color: #e74c3c;
        }
    </style>
</head>
<body>

<div class="app-header">
    <div class="logo">🧼 Grime Guys</div>
    <button class="menu-toggle" id="menuToggle">☰</button>
    <a href="job-form.html" class="btn">+ New Job</a>
</div>

<!-- Navigation loaded from nav.html -->
<div id="nav-container"></div>

<main class="main-content">
    <div class="card">
        <div class="section-header">
            <h2>💸 Expense Tracker</h2>
            <button class="btn" onclick="showAddExpenseModal()">+ Add Expense</button>
        </div>
        
        <div class="expense-summary" id="expenseSummary"></div>
        
        <h3>Recent Expenses</h3>
        <div id="expensesList"></div>
    </div>
</main>

<!-- Add Expense Modal -->
<div id="expenseModal" class="modal" style="display:none;">
    <div class="modal-content">
        <h3>Add Expense</h3>
        <form id="expenseForm">
            <div class="form-group">
                <label>Category</label>
                <select id="expenseCategory" required>
                    <option value="Gas">Gas</option>
                    <option value="Equipment">Equipment</option>
                    <option value="Supplies">Supplies</option>
                    <option value="Maintenance">Maintenance</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Amount ($)</label>
                <input type="number" id="expenseAmount" step="0.01" required>
            </div>
            <div class="form-group">
                <label>Date</label>
                <input type="date" id="expenseDate" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <input type="text" id="expenseDescription" placeholder="What was this for?">
            </div>
            <div class="form-group">
                <label>Related Job (optional)</label>
                <select id="expenseJobId">
                    <option value="">None</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 16px;">
                <button type="submit" class="btn">Save</button>
                <button type="button" class="btn btn-secondary" onclick="closeExpenseModal()">Cancel</button>
            </div>
        </form>
    </div>
</div>

<script>
    // Load navigation
    fetch('nav.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('nav-container').innerHTML = data;
        });
    
    let allJobs = [];
    let allExpenses = [];

    async function loadData() {
        await Promise.all([
            loadJobs(),
            loadExpenses()
        ]);
        displayExpenses();
    }

    async function loadJobs() {
        const res = await fetch('http://localhost:3001/api/jobs?limit=500');
        allJobs = await res.json();
        const jobSelect = document.getElementById('expenseJobId');
        jobSelect.innerHTML = '<option value="">None</option>' + 
            allJobs.map(job => `<option value="${job.id}">${job.customer_name} - ${job.service_type}</option>`).join('');
    }

    async function loadExpenses() {
        const res = await fetch('http://localhost:3001/api/expenses');
        allExpenses = await res.json();
    }

    function displayExpenses() {
        const summary = {};
        allExpenses.forEach(exp => {
            if (!summary[exp.category]) summary[exp.category] = 0;
            summary[exp.category] += exp.amount;
        });
        
        const summaryHtml = Object.entries(summary).map(([cat, amount]) => `
            <div class="expense-card">
                <div class="expense-category">${cat}</div>
                <div class="expense-amount">$${amount.toFixed(2)}</div>
            </div>
        `).join('');
        
        document.getElementById('expenseSummary').innerHTML = summaryHtml || '<p>No expenses yet</p>';
        
        const expensesList = document.getElementById('expensesList');
        if (allExpenses.length === 0) {
            expensesList.innerHTML = '<p style="text-align:center; color:#999;">No expenses recorded. Add your first expense!</p>';
            return;
        }
        
        expensesList.innerHTML = allExpenses.map(exp => `
            <div class="job-card">
                <div class="job-info">
                    <div class="job-customer">${exp.category}</div>
                    <div class="job-service">${exp.description || 'No description'}</div>
                    <div class="job-service">${exp.date}</div>
                </div>
                <div class="job-meta">
                    <div class="job-profit" style="color:#e74c3c;">-$${exp.amount.toFixed(2)}</div>
                    ${exp.job_id ? `<div class="job-service">Job #${exp.job_id}</div>` : ''}
                </div>
            </div>
        `).join('');
    }

    async function saveExpense(event) {
        event.preventDefault();
        const expense = {
            category: document.getElementById('expenseCategory').value,
            amount: parseFloat(document.getElementById('expenseAmount').value),
            date: document.getElementById('expenseDate').value,
            description: document.getElementById('expenseDescription').value,
            job_id: document.getElementById('expenseJobId').value || null
        };
        
        await fetch('http://localhost:3001/api/expenses', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(expense)
        });
        
        closeExpenseModal();
        loadExpenses();
        setTimeout(() => displayExpenses(), 100);
    }

    function showAddExpenseModal() {
        document.getElementById('expenseModal').style.display = 'flex';
        document.getElementById('expenseDate').value = new Date().toISOString().split('T')[0];
        document.getElementById('expenseForm').reset();
    }

    function closeExpenseModal() {
        document.getElementById('expenseModal').style.display = 'none';
    }

    document.getElementById('expenseForm').addEventListener('submit', saveExpense);

    loadData();
</script>
</body>
</html>
