<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Grime Guys - Jobs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-header">
    <div class="logo">
        <img src="logo.png" alt="Grime Guys" class="logo-img">
    </div>
    <button class="menu-toggle" id="menuToggle">☰</button>
    <a href="job-form.html" class="btn">+ New Job</a>
</div>

<div class="top-menu">
    <div class="top-menu-left">
        <a href="index.html">📊 Dashboard</a>
        <a href="jobs.html" class="active">📋 Jobs</a>
        <a href="calendar.html">📅 Calendar</a>
        <a href="quotes.html">📄 Quotes</a>
        <a href="pricing.html">💰 Pricing</a>
        <a href="clients.html">👥 Clients</a>
        <a href="expenses.html">💸 Expenses</a>
        <a href="inventory.html">📦 Inventory</a>
        <a href="photos.html">📸 Photos</a>
        <a href="invoices.html">🧾 Invoices</a>
        <a href="costing.html">💰 Job Costing</a>
        <a href="social.html">📱 Social</a>
        <a href="settings.html">⚙️ Settings</a>
    </div>
</div>

<div class="bottom-nav">
    <a href="index.html"><span>📊</span><span>Dashboard</span></a>
    <a href="jobs.html" class="active"><span>📋</span><span>Jobs</span></a>
    <a href="calendar.html"><span>📅</span><span>Calendar</span></a>
    <a href="quotes.html"><span>📄</span><span>Quotes</span></a>
    <a href="settings.html"><span>⚙️</span><span>Menu</span></a>
</div>

<main class="main-content">
    <div class="card">
        <div class="form-row">
            <input type="text" id="searchInput" placeholder="Search by customer or address..." style="flex:1; padding:10px; border-radius:8px; border:1px solid #ccc;">
            <select id="statusFilter" style="padding:10px; border-radius:8px;">
                <option value="all">All Status</option>
                <option value="Quote">Quote</option>
                <option value="Scheduled">Scheduled</option>
                <option value="Completed">Completed</option>
                <option value="Paid">Paid</option>
            </select>
            <select id="serviceFilter" style="padding:10px; border-radius:8px;">
                <option value="all">All Services</option>
                <option value="Mowing">Mowing</option>
                <option value="Pressure Washing">Pressure Washing</option>
                <option value="Leaf Blowing">Leaf Blowing</option>
                <option value="Bush Trimming">Bush Trimming</option>
                <option value="Mulching">Mulching</option>
                <option value="Ice Removal">Ice Removal</option>
            </select>
            <button class="btn btn-secondary" onclick="resetFilters()">Reset</button>
            <button class="btn" onclick="exportCSV()">Export CSV</button>
        </div>
    </div>

    <div id="jobsList"></div>
</main>

<a href="job-form.html" class="fab"><span>+</span> <span>New Job</span></a>

<script>
    let allJobs = [];

    async function loadJobs() {
        const search = document.getElementById('searchInput').value;
        const status = document.getElementById('statusFilter').value;
        const service = document.getElementById('serviceFilter').value;

        let url = `http://localhost:3001/api/jobs?limit=100`;
        if (search) url += `&search=${encodeURIComponent(search)}`;
        if (status !== 'all') url += `&status=${status}`;
        if (service !== 'all') url += `&service_type=${service}`;

        const res = await fetch(url);
        allJobs = await res.json();
        displayJobs();
    }

    function displayJobs() {
        const container = document.getElementById('jobsList');
        
        if (allJobs.length === 0) {
            container.innerHTML = '<div class="card text-center" style="padding:40px;">No jobs found. Create your first job!</div>';
            return;
        }

        container.innerHTML = allJobs.map(job => `
            <div class="job-card">
                <div class="job-info">
                    <div class="job-customer">${job.customer_name}</div>
                    <div class="job-service">${job.address}</div>
                    <div class="job-service">${job.service_type} | ${job.job_date || 'No date'}</div>
                    <div class="job-service">Profit: $${job.profit || 0}</div>
                </div>
                <div class="job-meta">
                    <div>Revenue: $${job.revenue || 0} / Expenses: $${job.expenses || 0}</div>
                    <div class="status-badge status-${job.status}">${job.status}</div>
                    <div class="mt-2">
                        <button class="btn-small" onclick="editJob(${job.id})">Edit</button>
                        <button class="btn-small btn-danger" onclick="deleteJob(${job.id})">Delete</button>
                        ${job.status !== 'Paid' && job.status !== 'Completed' ? `<button class="btn-small" onclick="markPaid(${job.id})">Mark Paid</button>` : ''}
                    </div>
                </div>
            </div>
        `).join('');
    }

    async function editJob(id) {
        window.location.href = `job-form.html?id=${id}`;
    }

    async function deleteJob(id) {
        if (confirm('Are you sure you want to delete this job?')) {
            await fetch(`http://localhost:3001/api/jobs/${id}`, { method: 'DELETE' });
            loadJobs();
        }
    }

    async function markPaid(id) {
        const method = prompt('Payment method? (Cash, Card, Venmo, CashApp)');
        if (method) {
            await fetch(`http://localhost:3001/api/jobs/${id}/paid`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ payment_method: method })
            });
            loadJobs();
        }
    }

    function resetFilters() {
        document.getElementById('searchInput').value = '';
        document.getElementById('statusFilter').value = 'all';
        document.getElementById('serviceFilter').value = 'all';
        loadJobs();
    }

    function exportCSV() {
        window.location.href = 'http://localhost:3001/api/export';
    }

    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    const closeSidebar = document.getElementById('closeSidebar');
    if (menuToggle) {
        menuToggle.addEventListener('click', () => sidebar.classList.add('open'));
    }
    if (closeSidebar) {
        closeSidebar.addEventListener('click', () => sidebar.classList.remove('open'));
    }

    document.getElementById('searchInput').addEventListener('input', loadJobs);
    document.getElementById('statusFilter').addEventListener('change', loadJobs);
    document.getElementById('serviceFilter').addEventListener('change', loadJobs);

    loadJobs();
</script>
</body>
</html>
